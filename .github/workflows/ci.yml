name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Backend CI
  # ────────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend CI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # MySQL service container — required for integration tests
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root_password
          MYSQL_DATABASE: hotel_booking_db
          MYSQL_USER: ci_user
          MYSQL_PASSWORD: ci_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root --password=ci_root_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install backend dependencies
        run: npm ci

      - name: Initialise test database schema
        run: |
          mysql -h 127.0.0.1 -u root --password=ci_root_password \
            hotel_booking_db < database/database.sql

      - name: Run backend tests
        run: npm test
        env:
          # Safe test-only values — never use production credentials here
          PORT: 5001
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: ci_user
          DB_PASSWORD: ci_password
          DB_NAME: hotel_booking_db
          JWT_SECRET: "ci-test-secret-long-enough-for-jwt-validation-purposes"
          JWT_EXPIRES_IN: 7d
          CLIENT_URL: http://localhost:5173
          APP_TIMEZONE: Asia/Colombo

      - name: Security audit (high severity)
        # Informational — does not block the workflow
        run: npm audit --audit-level=high

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend CI
  # ────────────────────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend CI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      # Plain npm ci passes now that @popperjs/core is an explicit dependency
      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Security audit (high severity)
        run: npm audit --audit-level=high
